<div class="max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/customers" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-lg hover:bg-gray-100">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">New Customer</h1>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    @if (error()) {
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-5">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
        <input formControlName="name" type="text" placeholder="e.g. John Doe"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors" />
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <p class="text-red-600 text-xs mt-1">Name is required (minimum 2 characters).</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
        <input formControlName="email" type="email" placeholder="e.g. john@example.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-red-600 text-xs mt-1">A valid email address is required.</p>
        }
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" [disabled]="form.invalid || loading()"
          class="flex-1 bg-indigo-700 hover:bg-indigo-800 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
          @if (loading()) { Creating... } @else { Create Customer }
        </button>
        <a routerLink="/customers"
          class="flex-1 text-center border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2.5 rounded-lg transition-colors text-sm">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
